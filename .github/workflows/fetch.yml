name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # lets you also run it manually

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Run feed fetcher
        run: python fetch_feed.py

      - name: Commit updated feed.json
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add feed.json
          git diff --staged --quiet || git commit -m "Update feed.json"
          git push
